<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create Interview Schedule</title>
  <style>
    * {
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      margin: 0;
      padding: 0;
      background: #f4f7fb;
      color: #1e293b;
    }

    .container {
      max-width: 700px;
      margin: 40px auto;
      padding: 20px;
    }

    .card {
      background: #fff;
      padding: 25px;
      border-radius: 16px;
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.08);
    }

    h1 {
      text-align: center;
      margin-bottom: 25px;
      color: #1e3a5f;
    }

    .form-group {
      margin-bottom: 16px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-weight: bold;
      color: #334155;
    }

    input, select, button {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid #cbd5e1;
      font-size: 14px;
    }

    button {
      background: #2563eb;
      color: white;
      font-weight: bold;
      border: none;
      cursor: pointer;
      margin-top: 10px;
    }

    button:hover {
      background: #1d4ed8;
    }

    .success {
      display: none;
      margin-top: 16px;
      background: #dcfce7;
      color: #15803d;
      padding: 12px;
      border-radius: 10px;
      font-weight: bold;
    }

    .error {
      display: none;
      margin-top: 16px;
      background: #fee2e2;
      color: #dc2626;
      padding: 12px;
      border-radius: 10px;
      font-weight: bold;
    }

    .result-box {
      display: none;
      margin-top: 20px;
      padding: 16px;
      border-radius: 12px;
      background: #eff6ff;
      border: 1px solid #bfdbfe;
    }

    .result-box p {
      margin: 8px 0;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <h1>Create Interview Schedule</h1>

      <form id="scheduleForm">
        <div class="form-group">
          <label for="candidate_name">Candidate Name</label>
          <input type="text" id="candidate_name" required />
        </div>

        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" required />
        </div>

        <div class="form-group">
          <label for="role">Role</label>
          <input type="text" id="role" required />
        </div>

        <div class="form-group">
          <label for="interview_date">Interview Date</label>
          <input type="date" id="interview_date" required />
        </div>

        <div class="form-group">
          <label for="interview_time">Interview Time</label>
          <input type="text" id="interview_time" placeholder="e.g. 12:30 PM" required />
        </div>

        <div class="form-group">
          <label for="status">Status</label>
          <select id="status">
            <option value="scheduled" selected>scheduled</option>
            <option value="completed">completed</option>
            <option value="cancelled">cancelled</option>
          </select>
        </div>

        <button type="submit">Create Schedule</button>
      </form>

      <div class="success" id="successBox">Schedule created successfully!</div>
      <div class="error" id="errorBox"></div>

      <div class="result-box" id="resultBox">
        <h3>Created Schedule</h3>
        <p><strong>ID:</strong> <span id="res_id"></span></p>
        <p><strong>Candidate Name:</strong> <span id="res_candidate_name"></span></p>
        <p><strong>Email:</strong> <span id="res_email"></span></p>
        <p><strong>Role:</strong> <span id="res_role"></span></p>
        <p><strong>Date:</strong> <span id="res_date"></span></p>
        <p><strong>Time:</strong> <span id="res_time"></span></p>
        <p><strong>Status:</strong> <span id="res_status"></span></p>
      </div>
    </div>
  </div>

  <script>
    const API_URL = "http://127.0.0.1:8004/schedules";

    const form = document.getElementById("scheduleForm");
    const successBox = document.getElementById("successBox");
    const errorBox = document.getElementById("errorBox");
    const resultBox = document.getElementById("resultBox");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();

      successBox.style.display = "none";
      errorBox.style.display = "none";
      resultBox.style.display = "none";

      const payload = {
        candidate_name: document.getElementById("candidate_name").value.trim(),
        email: document.getElementById("email").value.trim(),
        role: document.getElementById("role").value.trim(),
        interview_date: document.getElementById("interview_date").value,
        interview_time: document.getElementById("interview_time").value.trim(),
        status: document.getElementById("status").value
      };

      try {
        const response = await fetch(API_URL, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify(payload)
        });

        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.detail || "Failed to create schedule");
        }

        successBox.style.display = "block";
        resultBox.style.display = "block";

        document.getElementById("res_id").textContent = data.id;
        document.getElementById("res_candidate_name").textContent = data.candidate_name;
        document.getElementById("res_email").textContent = data.email;
        document.getElementById("res_role").textContent = data.role;
        document.getElementById("res_date").textContent = data.interview_date;
        document.getElementById("res_time").textContent = data.interview_time;
        document.getElementById("res_status").textContent = data.status;

        form.reset();
      } catch (error) {
        errorBox.style.display = "block";
        errorBox.textContent = error.message || "Something went wrong";
      }
    });
  </script>
</body>
</html>
