{% load static socialaccount i18n %}

<link rel="stylesheet" href="{% static 'css/landing_page.css' %}"/>

<div class="hero signup-hero">

    <div class="hero-inner signup-box">

        <div class="hero-pill">Start free</div>

        <h1 class="hero-h1 signup-title">
            Start your journey<br>
            <em>with one click.</em>
        </h1>

        <p class="hero-body">
            No forms. No friction. Just sign in with Google.
        </p>

        <!-- GOOGLE LOGIN -->
        <a href="{% provider_login_url 'google' %}" class="btn-primary signup-btn">
            Continue with Google →
        </a>

        <!-- LOGIN -->
        <p class="signup-login">
            Already have an account?
            <a href="{% url 'account_login' %}" class="btn-ghost">Sign in →</a>
        </p>

        <p class="hero-micro">
            Free forever plan. No credit card required.
        </p>

    </div>
</div>
